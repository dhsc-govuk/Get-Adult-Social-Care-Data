# Local development docker compose for the frontend
# (only used for development/testing at the moment)
services:
    app:
        container_name: gascd_frontend
        image: gascd_frontend_image
        build:
            context: .
            args:
                - NEXT_PUBLIC_GASCD_GIT_HASH=${NEXT_PUBLIC_GASCD_GIT_HASH}
                - NEXT_PUBLIC_GASCD_GIT_TAG=${NEXT_PUBLIC_GASCD_GIT_TAG}
        ports:
            - 3000:80
        env_file:
            - .env
        environment:
            - PORT=80
            # Override user db if running in docker
            - USER_DB_SERVER=host.docker.internal
    userdb:
        container_name: gascd_frontend_userdb
        image: gascd_userdb_image
        build:
            context: ./TestData/testing_userdb
            dockerfile: Dockerfile_userdb
        env_file: 
            - .env
        environment:
            ACCEPT_EULA: "Y"
            MSSQL_SA_PASSWORD: "${USER_DB_PASSWORD}"
            MSSQL_PID: "Evaluation"
            DB_NAME: "${USER_DATABASE}"
        ports:
            - "1444:1433"
        volumes:
            - gascd_userdb_data:/var/opt/mssql
        restart: always 

# Define named volumes so that data persists
volumes:
  gascd_userdb_data:
    driver: local

