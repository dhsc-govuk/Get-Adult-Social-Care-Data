
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - '*'  
  paths:
    include:
      - gascd_api
      - backend-pipeline.yml

resources:
  - repo: self
    
variables:
  - group: acr_service_connection
  - group: arm_service_connection
  - group: docker_build_arguments
  - group: data_db_connection
  - name: vmImageName
    value: "ubuntu-latest"
  - name: tag
    value: "$(Build.BuildId)"
  - name: dockerfilePath
    value: "$(Build.SourcesDirectory)/gascd_api/api/Dockerfile"
  - name: imageName
    value: "gascd-backend"
  - name: acrConnection
    value: "$(acr_connection)"
  - name: acrName
    value: "$(acr_name)"
    
parameters:
  - name: environments
    type: object
    default:
      - name: dev
        arm_connection: "$(dev_arm_service_connections)"
        db_server: "$(dev_db_server)"
        db_port: "$(dev_db_port)"
        db_user: "$(dev_db_user)"
        # Temporarily commented out as we're not ready to deploy in these environments yet
#      - name: uat
#        arm_connection: "$(uat_arm_service_connections)"
#      - name: prod
#        arm_connection: "$(prod_arm_service_connections)"
    
stages:
  - stage: Build_and_Test
    displayName: 'Build and Test .NET 9 App'
    jobs:
      - job: BuildJob
        pool:
          vmImage: $(vmImageName)
        
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 9 SDK'
            inputs:
              version: '9.0.109'
              packageType: 'sdk'

          - task: DotNetCoreCLI@2
            displayName: 'Restore Dependencies'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'Build Application'
            inputs:
              command: 'build'
              projects: '**/*.csproj'
              arguments: '--configuration Release'

          - task: DotNetCoreCLI@2
            displayName: 'Run Unit Tests'
            inputs:
              command: 'test'
              # Assumes unit test projects end with *Tests.csproj
              projects: '**/*Tests.csproj'
              arguments: '--configuration Release --collect "Code Coverage"'
              publishTestResults: true
              
  - stage: Build_Image
    displayName: "Build/push Docker image (all environments)"
    condition: succeeded()
    jobs:
      - deployment: Build
        displayName: Build
        environment: "dev"
        pool:
          vmImage: $(vmImageName)
        strategy:
          runOnce:
            deploy:
              steps:
                # This step fetches the last 50 commits and all tags.
                # (performance optimization over fetchDepth: 0)
                - checkout: self
                  fetchDepth: 50
                  fetchTags: true
                    
                - task: DotNetCoreCLI@2
                  displayName: Install dotnet-ef
                  inputs:
                    command: 'custom'
                    custom: 'tool'
                    arguments: 'install --global dotnet-ef --version 9.0.*'
                
                # create migration bundle
                - task: CmdLine@2
                  displayName: Create migration bundle
                  inputs:
                    workingDirectory: '$(Build.SourcesDirectory)/gascd_api/api'
                    script: 'dotnet-ef migrations bundle --output $(Build.ArtifactStagingDirectory)/efbundle --self-contained'
                    
                - task: PublishBuildArtifacts@1
                  displayName: 'Publish Migration Bundle Artifact'
                  inputs:
                    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
                    ArtifactName: 'migration-bundle'
                    publishLocation: 'Container'
                    
                - task: CmdLine@2
                  displayName: Build docker image
                  inputs:
                    workingDirectory: '$(Build.SourcesDirectory)/gascd_api/api'
                    script: 'docker build -f $(dockerfilePath) -t $(acr_name).azurecr.io/$(imageName):$(tag) .'
                  
                - task: Docker@2
                  displayName: Login to $(acr_connection) ACR
                  inputs:
                    command: login
                    containerRegistry: $(acr_connection)
                    
                - task: CmdLine@2
                  displayName: Push image to $(acr_name) ACR
                  inputs:
                    workingDirectory: '$(Build.SourcesDirectory)/gascd_api/api'
                    script: 'docker push $(acr_name).azurecr.io/$(imageName):$(tag)'
                      
  # Deploy across environments
  - ${{ each environment in parameters.environments}}:
      - stage: Migrate_${{environment.name}}
        displayName: "${{environment.name}}: Migrate Postgres DB"
        condition: succeeded()
        trigger: manual
        jobs:
          - deployment: Deploy
            displayName: Migrate database
            environment: "${{environment.name}}"
            pool:
              vmImage: "ubuntu-latest"
            strategy:
              runOnce:
                deploy:
                  steps:
                    - task: DownloadPipelineArtifact@2
                      displayName: 'Download Migration Bundle Artifact'
                      inputs:
                        buildType: 'current'
                        artifactName: 'migration-bundle'
                        downloadPath: '$(System.DefaultWorkingDirectory)'
                        
                    - task: AzureCLI@2
                      displayName: 'Apply migrations with access token'
                      inputs:
                        azureSubscription: ${{environment.arm_connection}}
                        scriptType: 'bash'
                        scriptLocation: 'inlineScript'
                        inlineScript: |
                          # 1. Get an Access Token for Azure SQL (resource ID is fixed)
                          # We verify the token is fetched before proceeding
                          TOKEN=$(az account get-access-token --resource https://ossrdbms-aad.database.windows.net --query accessToken -o tsv)

                          if [ -z "$TOKEN" ]; then
                            echo "Error: Failed to obtain access token"
                            exit 1
                          fi

                          echo "Access token obtained successfully."
                          
                          CONNECTION_STRING="Host=${{environment.db_server}};Port=${{environment.db_port}};Database=gascd_data;Username=${{environment.db_user}};Password=$TOKEN;Ssl Mode=Require"
                          chmod +x ./efbundle
                          # Run the Better Auth migration
                          ./efbundle --connection "$CONNECTION_STRING"
      - stage: Deploy_${{environment.name}}
        displayName: "${{environment.name}}: Deploy backend API"
        condition: succeeded()
        jobs:
          - deployment: Deploy
            displayName: Deploy
            environment: "${{environment.name}}"
            pool:
              vmImage: "ubuntu-latest"
            strategy:
              runOnce:
                deploy:
                  steps:
                    - task: Docker@2
                      displayName: Login to $(acr_connection) ACR
                      inputs:
                        command: login
                        containerRegistry: $(acr_connection)
                    - task: AzureContainerApps@1
                      inputs:
                        azureSubscription: '${{environment.arm_connection}}'
                        imageToDeploy: '$(acr_name).azurecr.io/$(imageName):$(tag)'
                        containerAppName: 'dapalpha-data-api-${{environment.name}}'
                        resourceGroup: 'dapalpha-container-apps-${{environment.name}}-rg'
                        containerAppEnvironment: 'dapalpha-container-apps-env-${{environment.name}}'      