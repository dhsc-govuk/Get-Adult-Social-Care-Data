name: GASCD Model Tests # optional

# model_file: ./model.fga # you can specify an external .fga file, or include it inline
model_file: ./model.fga 

# OpenFGA yaml formatter doesn't seem to like this key, but it works fine
tuple_files:
  - ./testtuples.yaml

tests:
  - name: Test public metric (no location)
    # For public metrics, any (or no) location allows access
    check:
      - user: user:anne
        object: metric:public_x
        assertions:
          can_view: true
      - user: user:bob
        object: metric:public_x
        assertions:
          can_view: true
    list_users:
      - object: metric:public_x
        user_filter:
          - type: user
        assertions:
          can_view:
            users: [user:*]
          
  - name: Test public metric (bristol)
    tuples:
      - user: provider_location:bristol
        relation: location
        object: metric:public_x
    check:
      - user: user:anne
        object: metric:public_x
        assertions:
          can_view: true
      - user: user:bob
        object: metric:public_x
        assertions:
          can_view: true

  - name: Test public metric (london)
    tuples:
      - user: provider_location:london
        relation: location
        object: metric:public_x
    check:
      - user: user:anne
        object: metric:public_x
        assertions:
          can_view: true
      - user: user:bob
        object: metric:public_x
        assertions:
          can_view: true
          
  - name: Test private metric (no location)
    # If private, 
    check:
      - user: user:anne
        object: metric:beds_occupied
        assertions:
          can_view: false
      - user: user:bob
        object: metric:beds_occupied
        assertions:
          can_view: false

  - name: Test private metric (bristol)
    tuples:
      - user: provider_location:bristol
        relation: location
        object: metric:beds_occupied
    check:
      - user: user:anne
        object: metric:beds_occupied
        assertions:
          can_view: true
      - user: user:bob
        object: metric:beds_occupied
        assertions:
          can_view: false

  - name: Test private metric (london)
    tuples:
      - user: provider_location:london
        relation: location
        object: metric:beds_occupied
    check:
      - user: user:anne
        object: metric:beds_occupied
        assertions:
          can_view: false
      # even though bob is in the correct location, 
      # he has NO access to this specific metric (beds_occupied)
      - user: user:bob
        object: metric:beds_occupied
        assertions:
          can_view: false

  - name: Test private metric (southwest region)
    tuples:
      - user: region:southwest
        relation: location
        object: metric:beds_occupied
    list_users:
      - object: metric:beds_occupied
        user_filter:
          - type: user
        assertions:
          can_view:
            users:
              - user:anne

  - name: Test private metric (southeast region)
    tuples:
      - user: region:southeast
        relation: location
        object: metric:beds_occupied
    list_users:
      - object: metric:beds_occupied
        user_filter:
          - type: user
        assertions:
          can_view:
            users: []
