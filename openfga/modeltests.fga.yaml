name: GASCD Model Tests # optional

# model_file: ./model.fga # you can specify an external .fga file, or include it inline
model_file: ./model.fga 

# OpenFGA yaml formatter doesn't seem to like this key, but it works fine
tuple_files:
  - ./testtuples.yaml

tests:
  - name: Test public metric (no location)
    # For public metrics, any (or no) location allows access
    check:
      - user: user:anne
        object: metric:public_x
        assertions:
          can_view: true
      - user: user:bob
        object: metric:public_x
        assertions:
          can_view: true
    list_users:
      - object: metric:public_x
        user_filter:
          - type: user
        assertions:
          can_view:
            users: [user:*]
          
  - name: Test public metric (care_provider_B_bristol)
    tuples:
      - user: provider_location:care_provider_B_bristol
        relation: location
        object: metric:public_x
    check:
      - user: user:anne
        object: metric:public_x
        assertions:
          can_view: true
      - user: user:bob
        object: metric:public_x
        assertions:
          can_view: true

  - name: Test public metric (care_provider_A_london)
    tuples:
      - user: provider_location:care_provider_A_london
        relation: location
        object: metric:public_x
    check:
      - user: user:anne
        object: metric:public_x
        assertions:
          can_view: true
      - user: user:bob
        object: metric:public_x
        assertions:
          can_view: true
          
  - name: Test private metric (no location)
    # If private, 
    check:
      - user: user:anne
        object: metric:ct_metrics
        assertions:
          can_view: false
      - user: user:bob
        object: metric:ct_metrics
        assertions:
          can_view: false

  - name: Test private metric (care_provider_B_bristol)
    tuples:
      - user: provider_location:care_provider_B_bristol
        relation: location
        object: metric:ct_metrics
    check:
      - user: user:anne
        object: metric:ct_metrics
        assertions:
          can_view: true
      - user: user:bob
        object: metric:ct_metrics
        assertions:
          can_view: false

  - name: Test private metric (care_provider_A_london)
    tuples:
      - user: provider_location:care_provider_A_london
        relation: location
        object: metric:ct_metrics
    check:
      - user: user:anne
        object: metric:ct_metrics
        assertions:
          can_view: false
      # even though bob is in the correct location, 
      # he has NO access to this specific metric (ct_metrics)
      - user: user:bob
        object: metric:ct_metrics
        assertions:
          can_view: false

  - name: Test private metric (southwest region)
    tuples:
      - user: region:southwest
        relation: location
        object: metric:ct_metrics
    list_users:
      - object: metric:ct_metrics
        user_filter:
          - type: user
        assertions:
          can_view:
            users:
              - user:anne

  - name: Test private metric (southeast region)
    tuples:
      - user: region:southeast
        relation: location
        object: metric:ct_metrics
    list_users:
      - object: metric:ct_metrics
        user_filter:
          - type: user
        assertions:
          can_view:
            users: []

  - name: Anne can access Bristol City
    tuples:
      - user: local_authority:bristol_city
        relation: location
        object: metric:ct_metrics
    check:
      - user: user:anne
        object: metric:ct_metrics
        assertions:
          can_view: true

  - name: Test cross-LA access - Anne can access Bath Somerset (other LA in southwest)
    tuples:
      - user: local_authority:bath_somerset
        relation: location
        object: metric:ct_metrics
    check:
      - user: user:anne
        object: metric:ct_metrics
        assertions:
          can_view: true
          
  - name: Test cross-LA access - Anne cannot access Westminster
    tuples:
      - user: local_authority:westminster
        relation: location
        object: metric:ct_metrics
    check:
      - user: user:anne
        object: metric:ct_metrics
        assertions:
          can_view: false

  - name: Bob cannot access Westminster - no metric access
    tuples:
      - user: local_authority:westminster
        relation: location
        object: metric:ct_metrics
    check:
      - user: user:bob
        object: metric:ct_metrics
        assertions:
          can_view: false

  - name: Bob cannot access Tower Hamlets (other LA in southeast) - no metric access
    tuples:
      - user: local_authority:tower_hamlets
        relation: location
        object: metric:ct_metrics
    check:
      - user: user:bob
        object: metric:ct_metrics
        assertions:
          can_view: false


  - name: Test private metric (england country)
    tuples:
      - user: country:england
        relation: location
        object: metric:ct_metrics
    check:
      - user: user:anne
        object: metric:ct_metrics
        assertions:
          can_view: true
      - user: user:bob
        object: metric:ct_metrics
        assertions:
          can_view: false # bob has no access to this metric at all