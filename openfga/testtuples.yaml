# user_memberships:
# - puts users in their providers
- user: user:anne
  relation: member
  object: provider:nhs_bristol

- user: user:bob
  relation: member
  object: provider:bupa_london

# providers:
# - associates providers with a provider location
- user: provider:nhs_bristol
  relation: provider
  object: provider_location:bristol

- user: provider:bupa_london
  relation: provider
  object: provider_location:london

# regions
# - gives all provider_locations a region
- user: provider_location:bristol
  relation: provider_location
  object: region:southwest

- user: provider_location:london
  relation: provider_location
  object: region:southeast

# metrics

# public access to a metric requires the relations metric_viewer and has_location_access user:*
- user: user:*
  relation: metric_viewer
  object: metric:public_x
- user: user:*
  relation: has_location_access
  object: metric:public_x
  
# private access for providers to specific metrics (also requires location)
- user: provider:nhs_bristol#member
  relation: metric_viewer
  object: metric:beds_occupied

- user: provider:bupa_london#member
  relation: metric_viewer
  object: metric:population_age



