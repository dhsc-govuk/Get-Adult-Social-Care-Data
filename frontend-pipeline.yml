# Docker

# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
  - main

resources:
  - repo: self

variables:
  # Variable groups
  - group: acr_service_connection
  - group: arm_service_connection
  - group: docker_build_arguments
  - group: user_db_connection
  # Hardcoded variables
  - name: imageRepository
    value: "dapalpha"
  - name: dockerfilePath
    value: "$(Build.SourcesDirectory)/gascd_frontend/Dockerfile"
  - name: tag
    value: "$(Build.BuildId)"
  - name: vmImageName
    value: "ubuntu-latest"

# Environment parameters to iterate through
parameters:
  - name: environments
    type: object
    default:
      - name: dev
        environment_name: "Webapp - dev"
        arm_connection: "$(dev_arm_service_connections)"
        acr_connection: "$(dev_acr_connection)"
        acr_name: "$(dev_acr_name)"
        user_db_name: "$(dev_user_db_name)"
        user_db_server: "$(dev_user_db_server)"
        user_db_port: "$(dev_user_db_port)"
      - name: uat
        environment_name: "Webapp - UAT"
        arm_connection: "$(uat_arm_service_connections)"
        acr_connection: "$(uat_acr_connection)"
        acr_name: "$(uat_acr_name)"
        user_db_name: "$(uat_user_db_name)"
        user_db_server: "$(uat_user_db_server)"
        user_db_port: "$(uat_user_db_port)"
      - name: prod
        environment_name: "Webapp - prod"
        arm_connection: "$(prod_arm_service_connections)"
        acr_connection: "$(prod_acr_connection)"
        acr_name: "$(prod_acr_name)"
        user_db_name: "$(prod_user_db_name)"
        user_db_server: "$(prod_user_db_server)"
        user_db_port: "$(prod_user_db_port)"

stages:
  # Run tests once up front
  - stage: Tests
    displayName: "Run tests"
    condition: false
    jobs:
      - job: Tests
        displayName: Run automated Tests
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: "24.4.1"
          - script: npm ci
            displayName: install dependencies
            workingDirectory: gascd_frontend
          - script: npm run openapi:lint
            displayName: Check OpenAPI config
            workingDirectory: gascd_frontend
          - script: npm run test -- --reporter=default --reporter=junit --outputFile=junit.xml
            displayName: Run vitest Tests
            workingDirectory: gascd_frontend
          - task: PublishTestResults@2
            displayName: Publish Test Results
            inputs:
              testResultsFormat: "JUnit"
              searchFolder: "$(Build.SourcesDirectory)"
              testResultsFiles: "gascd_frontend/junit.xml"
              failTaskOnFailedTests: true
  # Build
  - stage: Build_Image
    displayName: "Build/push Docker image (all environments)"
    condition: false
    jobs:
      - deployment: Build
        displayName: Build
        environment: "prod"
        pool:
          vmImage: $(vmImageName)
        strategy:
          runOnce:
            deploy:
              steps:
                # This step fetches the last 50 commits and all tags.
                # (performance optimization over fetchDepth: 0)
                - checkout: self
                  fetchDepth: 50
                  fetchTags: true

                - script: |
                    NEXT_PUBLIC_GASCD_GIT_HASH=$(git rev-parse --short HEAD) \
                    NEXT_PUBLIC_GASCD_GIT_TAG=$(git describe --tags --abbrev=0 --always) \
                    docker build -f $(dockerfilePath) -t $(imageRepository):$(tag) gascd_frontend/. --build-arg NEXT_PUBLIC_GASCD_GIT_HASH --build-arg NEXT_PUBLIC_GASCD_GIT_TAG
                  displayName: Build Image

                - ${{ each environment in parameters.environments}}:
                    - task: Docker@2
                      displayName: Login to ${{environment.acr_connection}} ACR
                      inputs:
                        command: login
                        containerRegistry: ${{environment.acr_connection}}

                    - script: |
                        docker tag $(imageRepository):$(tag) ${{environment.acr_name}}.azurecr.io/$(imageRepository):$(tag)
                      displayName: Tag image for ${{environment.acr_name}} ACR

                    - script: |
                        docker push ${{environment.acr_name}}.azurecr.io/$(imageRepository):$(tag)
                      displayName: Push image to ${{environment.acr_name}} ACR
  # Deploy across environments
  - ${{ each environment in parameters.environments}}:
      - stage: Migrate_UserDB_${{environment.name}}
        displayName: "${{environment.name}}: Migrate user database"
        condition: true
        jobs:
          - job: Migrate
            displayName: Migrate database
            pool:
              vmImage: "ubuntu-latest"
            steps:
            - task: AzurePowerShell@5
              displayName: 'Set User DB permissions'
              inputs:
                azureSubscription: ${{environment.arm_connection}}
                ScriptType: 'InlineScript'
                Inline: |
                  # 1. Install the SQLServer module (Required on Linux agents)
                  # This contains Invoke-Sqlcmd and installs in seconds
                  Install-Module -Name SqlServer -Force -Scope CurrentUser -AllowClobber

                  # 2. Configuration
                  $ENV_NAME_UPPER = $env:ENV_NAME.ToUpper()
                  $GROUP_NAME_READERS="DAP Beta - User DB Readers - $ENV_NAME_UPPER"
                  $GROUP_NAME_WRITERS="DAP Beta - User DB Writers - $ENV_NAME_UPPER"

                  # 3. Get Access Token
                  $token = (Get-AzAccessToken -ResourceUrl https://database.windows.net).Token

                  # 4. The SQL Query
                  $query = @"
                    IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE name = '$GROUP_NAME_READERS')
                    BEGIN
                        CREATE USER [$GROUP_NAME_READERS] FROM EXTERNAL PROVIDER;
                        PRINT 'User ($GROUP_NAME_READERS) created.';
                    END
                    ALTER ROLE db_datareader ADD MEMBER [$GROUP_NAME_READERS];
                    IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE name = '$GROUP_NAME_WRITERS')
                    BEGIN
                        CREATE USER [$GROUP_NAME_WRITERS] FROM EXTERNAL PROVIDER;
                        PRINT 'User ($GROUP_NAME_WRITERS) created.';
                    END
                    ALTER ROLE db_datawriter ADD MEMBER [$GROUP_NAME_WRITERS];
                  "@
                  Write-Host "$query"
                  # 5. Run it
                  # The -AccessToken parameter is supported in this module
                  Invoke-Sqlcmd -ServerInstance $env:SQL_SERVER -Database $env:DB_NAME -AccessToken $token -Query $query
                azurePowerShellVersion: 'LatestVersion'
                pwsh: true # PowerShell Core (required for Linux)
              env:
                SQL_SERVER: "${{environment.user_db_server}}"
                DB_NAME: "${{environment.user_db_name}}"
                ENV_NAME: "${{environment.name}}"
            - checkout: self
            - task: NodeTool@0
              inputs:
                versionSpec: "24.4.1"
            - script: npm ci
              displayName: install dependencies
              workingDirectory: gascd_frontend
            - task: AzureCLI@2
              displayName: 'Run Migrations with access token'
              inputs:
                azureSubscription: ${{environment.arm_connection}}
                scriptType: 'bash'
                scriptLocation: 'inlineScript'
                inlineScript: |
                  # 1. Get an Access Token for Azure SQL (resource ID is fixed)
                  # We verify the token is fetched before proceeding
                  TOKEN=$(az account get-access-token --resource https://database.windows.net/ --query accessToken -o tsv)

                  if [ -z "$TOKEN" ]; then
                    echo "Error: Failed to obtain access token"
                    exit 1
                  fi

                  echo "Access token obtained successfully."

                  # 2. Run the migration, passing the token as an env var
                  export USER_DB_ACCESS_TOKEN=$TOKEN
                  export USER_DB_SERVER="${{environment.user_db_server}}"
                  export USER_DB_PORT="${{environment.user_db_port}}"
                  export USER_DATABASE="${{environment.user_db_name}}"
                  
                  # Run the Better Auth migration
                  cd gascd_frontend && npm run db:migrate -y
      - stage: Deploy_${{environment.name}}
        displayName: "${{environment.name}}: Deploy to Azure Web App"
        condition: succeeded()
        jobs:
          - deployment: Deploy
            displayName: Deploy
            environment: "${{environment.name}}"
            pool:
              vmImage: "ubuntu-latest"
            strategy:
              runOnce:
                deploy:
                  steps:
                    - task: Docker@2
                      displayName: Login to ${{environment.acr_connection}} ACR
                      inputs:
                        command: login
                        containerRegistry: ${{environment.acr_connection}}
                    # Ensure 'latest' is only updated when this deployment step actually runs.
                    - script: |
                        echo "Updating 'latest' tag for ${{environment.name}}..."
                        docker pull ${{environment.acr_name}}.azurecr.io/$(imageRepository):$(tag)
                        docker tag ${{environment.acr_name}}.azurecr.io/$(imageRepository):$(tag) ${{environment.acr_name}}.azurecr.io/$(imageRepository):latest
                        docker push ${{environment.acr_name}}.azurecr.io/$(imageRepository):latest
                      displayName: Update 'latest' tag on ${{environment.acr_name}}
                    - task: AzureWebAppContainer@1
                      inputs:
                        appType: "webAppLinux"
                        appName: "dapalpha-${{environment.name}}-app"
                        azureSubscription: ${{environment.arm_connection}}
                        containers: "${{environment.acr_name}}.azurecr.io/$(imageRepository):$(tag)"
