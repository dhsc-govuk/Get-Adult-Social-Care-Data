[tools]
dotnet = "9.0.109"  # use your SDK version

[tasks.lint]
description = "Run .NET code formatting and static analysis"
run = """
dotnet restore
dotnet format --verify-no-changes --severity warn
dotnet build --no-restore -warnaserror
"""

[tasks.api]
run = "dotnet run --project gascd_api"

[tasks.test]
run = "dotnet test"
