services:
  api:
    image: gascd-api-image
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "5050:5050"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker

  postgres:
    image: imresamu/postgis:18-3.6-bookworm
    ports:
      - "5432:5432"
    volumes:
      - ./api.Tests/TestData/test-seed.sql:/docker-entrypoint-initdb.d/test-seed.sql
    environment:
      - POSTGRES_USER=mr-ice-cool
      - POSTGRES_PASSWORD=is-rockin
      - POSTGRES_DB=gascd_data